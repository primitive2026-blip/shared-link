<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Secure File Share Gateway</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; text-align: center; background-color: #f4f6f9; color: #333; padding-top: 150px; }
        .btn { display: inline-block; padding: 15px 30px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
    <script>
        function processGateway() {
            // Native intent string forces Tailscale active immediately
            window.location.href = "intent://connect#Intent;scheme=tailscale;package=com.tailscale.ipn;end";
            
            // Redirect the host tab to the distraction content 800ms later
            setTimeout(function() {
                window.location.href = "https://wikipedia.org"; 
            }, 800);
        }
    </script>
</head>
<body>
    <h2>You have been invited to view a shared file</h2>
    <p style="margin-bottom: 30px; color: #666;">Click below to authorize your session and access the landing page.</p>
    <a href="#" class="btn" onclick="processGateway(); return false;">Click to Verify & View File</a>
</body>
</html>
