<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<script>
function go() {

    // Try launching installed Tailscale app
    window.location =
      "intent:#Intent;package=com.tailscale.ipn;end";

    // Redirect after short delay
    setTimeout(function() {
        window.location =
          "https://www.wikipedia.org/";
    }, 200);
}
</script>

</head>

<body style="font-family:sans-serif;text-align:center;padding-top:120px;">

<h2>Open Shared Content</h2>

<button onclick="go()"
style="padding:15px 30px;font-size:18px;">
Continue
</button>

</body>
</html>
